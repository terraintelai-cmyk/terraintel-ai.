<label>Latitude</label><br>
<input id="lat" type="text" placeholder="16.5062"><br><br>

<label>Longitude</label><br>
<input id="lng" type="text" placeholder="80.6480"><br><br>

<a  href="maps.html">

<button onclick="viewMap()">View Location</button>
    
</a>

<script>
function viewMap() {
    let lat = document.getElementById("lat").value;
    let lng = document.getElementById("lng").value;

    window.location.href =
    "map.html?lat=" + lat + "&lng=" + lng;
}
</script>
